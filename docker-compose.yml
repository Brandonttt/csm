version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: santamaria_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_secure_pass
      MARIADB_DATABASE: clinica_santamaria
      MARIADB_USER: santamaria_user
      MARIADB_PASSWORD: user_secure_pass
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: santamaria_adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  mariadb_data:
    driver: local